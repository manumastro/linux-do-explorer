<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linux.do 归档助手</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090A0C;
        --panel: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --border-glow: rgba(212, 175, 55, 0.3); /* Gold glow for hover */
        --text: #FFFFFF;
        --muted: #8A8F98;
        --primary: linear-gradient(135deg, #ECC371 0%, #B78A4B 100%);
        --primary-hover: linear-gradient(135deg, #FDF0B5 0%, #D4AF37 100%);
        --success: #34D399;
        --warning: #FBBF24;
        --danger: #F87171;
        --surface: rgba(255, 255, 255, 0.05);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        background: var(--bg);
        color: var(--text);
        letter-spacing: 0.01em;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      .wrap {
        width: 360px;
        padding: 16px;
        max-height: 600px;
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .wrap::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      .header {
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 600;
        background: linear-gradient(180deg, #FFFFFF 0%, #A1A1AA 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .sub {
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 12px;
        box-shadow: 0 4px 24px -6px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(10px);
      }

      .status-row,
      .option-row,
      .range-row,
      .meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .status-row,
      .option-row,
      .meta-row {
        margin-bottom: 8px;
      }

      .status-row:last-child,
      .option-row:last-child,
      .meta-row:last-child {
        margin-bottom: 0;
      }

      .label,
      .meta-label {
        font-size: 12px;
        color: #E4E4E7;
        font-weight: 500;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        background: var(--surface);
        border: 1px solid var(--border);
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
      }

      .badge.online {
        color: var(--success);
        border-color: rgba(52, 211, 153, 0.2);
        box-shadow: 0 0 10px rgba(52, 211, 153, 0.1);
      }

      .badge.offline {
        color: var(--danger);
        border-color: rgba(248, 113, 113, 0.2);
        box-shadow: 0 0 10px rgba(248, 113, 113, 0.1);
      }

      .badge.busy {
        color: var(--warning);
        border-color: rgba(251, 191, 36, 0.2);
        box-shadow: 0 0 10px rgba(251, 191, 36, 0.1);
      }

      .details {
        margin: 0;
      }

      .details summary {
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        color: #E4E4E7;
        user-select: none;
        transition: color 0.2s;
      }

      .details summary:hover {
        color: #ECC371; /* Gold hover */
      }

      .advanced {
        margin-top: 12px;
        display: grid;
        gap: 10px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .range-row {
        gap: 10px;
      }

      .range-field {
        flex: 1;
      }

      .range-field label {
        display: block;
        margin-bottom: 6px;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      input[type="number"], input[type="text"] {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.2);
        color: var(--text);
        transition: all 0.2s;
      }
      
      input[type="checkbox"] {
        accent-color: #D4AF37;
        width: 14px;
        height: 14px;
        border-radius: 4px;
      }

      input:focus {
        outline: none;
        border-color: rgba(212, 175, 55, 0.5); /* Gold glow */
        box-shadow: 0 0 0 1px rgba(212, 175, 55, 0.2);
        background: rgba(0, 0, 0, 0.4);
      }

      .help {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .primary-btn {
        background: var(--primary);
        color: #000000;
        text-shadow: 0 1px 0 rgba(255,255,255,0.3);
        box-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
      }

      .primary-btn:hover:not(:disabled) {
        background: var(--primary-hover);
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        transform: translateY(-1px);
      }

      .secondary-btn {
        margin-top: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
      }

      .secondary-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.15);
      }

      button:disabled,
      input:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .progress-wrap {
        margin: 12px 0 8px;
      }

      .progress-track {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: var(--primary);
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .status-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #FFFFFF;
      }

      .status-meta,
      .log {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .log {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        max-height: 80px;
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      
      .log::-webkit-scrollbar {
        width: 0;
        height: 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1>Linux.do 归档助手</h1>
        <div class="sub">导出当前帖子到本地 Markdown / PDF，适合个人归档与 AI 上下文整理。</div>
      </div>

      <div class="card">
        <div class="status-row">
          <span class="label">本地桥状态</span>
          <span id="bridgeBadge" class="badge">检测中</span>
        </div>
        <div id="bridgeHint" class="help">如果显示未启动，请双击便携包里的 `01-start-bridge.cmd`</div>
      </div>

      <div class="card">
        <div class="option-row">
          <label class="label" for="enablePdf">同时生成 PDF</label>
          <input id="enablePdf" type="checkbox" checked />
        </div>

        <details id="advancedPanel" class="details">
          <summary>高级选项</summary>
          <div class="advanced">
            <div class="range-row">
              <div class="range-field">
                <label for="postStart">起始楼层</label>
                <input id="postStart" type="number" inputmode="numeric" min="1" placeholder="留空=从 1 开始" />
              </div>
              <div class="range-field">
                <label for="postEnd">结束楼层</label>
                <input id="postEnd" type="number" inputmode="numeric" min="1" placeholder="留空=到最后一楼" />
              </div>
            </div>
            <div class="help">留空表示导出整帖。只想截取某个楼层区间时再填写。</div>
          </div>
        </details>
      </div>

      <button id="exportBtn" class="primary-btn">导出当前帖子</button>
      <button id="openFolderBtn" class="secondary-btn" disabled>打开最近一次输出目录</button>

      <div class="card progress-wrap">
        <div class="meta-row">
          <span class="meta-label">进度</span>
          <span id="progressText" class="meta-label">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="statusTitle" class="status-title">准备就绪</div>
        <div id="statusMeta" class="status-meta">打开一个 Linux.do 帖子后，点击上方按钮开始导出。</div>
        <div id="log" class="log"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
